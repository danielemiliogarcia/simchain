name: CI

on:
  # push: # tests your branch as-is
  pull_request: # tests "what would happen if this merged right now in a temporary merge commit"

  # Uncomment below (and remove the bare triggers above) to restrict to specific branches:
  # push:
  #   branches: [master, refactor]
  # pull_request:
  #   branches: [master, refactor]

env:
  CARGO_TERM_COLOR: always

# The workspace lives at the repo root, so no working-directory default is
# needed. Jobs are parallelized on purpose for a complete overview and faster
# feedback:
#   build-all ──┬── lint-and-format  (clippy + fmt)
#               └── test-1-thread     (both run after build-all, in parallel)
#
# --locked is passed everywhere: Cargo.lock is committed, so a PR that changes
# dependencies without updating the lockfile fails here instead of silently
# resolving fresh versions.

jobs:
  compose-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate no-socket control boundary
        run: ./scripts/check-compose-security.sh
      - name: Build images and inspect control-plane rootfs
        run: ./scripts/check-docker-images.sh

  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build All (uses .cargo/config.toml alias)
        run: cargo ba --locked # Build all targets (lib, bins, tests) in debug mode, consistent with the lint and test jobs

  lint-and-format:
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Format Check Only
        run: cargo fmt --all --check

  test-1-thread:
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --locked -- --test-threads=1
