# Simchain: single compose file, driven by .env (every ${VAR:-default} below
# has a working default, so it runs with no .env at all).
#
# Profiles:
#   (none) / "basic"  -> 3 nodes + mining controller + spammer
#   electrs           -> basic + electrs
#   mempool           -> basic + electrs + mempool.space explorer
#                        (mempool-web/mempool-api/mempool-db)
#   all-tools         -> basic + every tool above
#   reorg             -> reorg simulator (run on demand, see README)
#   partition         -> one-shot P2P latency/loss helpers
#   scenario          -> one-shot declarative scenario orchestrator
#
# Examples:
#   docker compose up
#   docker compose --profile mempool up
#   docker compose run --rm btc-simnet-reorg 3
#
# Each node is declared in full on purpose (no YAML anchors), so that in the
# future different nodes can run different bitcoind versions/images and
# per-node policies, like in a real network.

networks:
  btc-simnet-control:
    name: btc-simnet-control
  btc-simnet-p2p:
    name: btc-simnet-p2p
    ipam:
      config:
        - subnet: 172.30.0.0/24

# Node datadirs persist on named volumes: the chain survives `docker compose
# down` (the controller detects the height and skips the bootstrap) and can be
# archived/restored with ./scripts/snapshot.sh. `docker compose down -v` wipes
# them for a fresh chain. Explicit names (like the container and network names
# above) keep ./scripts/snapshot.sh independent of the compose project name.
volumes:
  node1-data:
    name: btc-simnet-node1-data
  node2-data:
    name: btc-simnet-node2-data
  node3-data:
    name: btc-simnet-node3-data

services:
  btc-simnet-node1:
    # Default: official registry image. Set BTC_IMAGE=simchainbitcoinnode:31.1
    # in .env to use the locally built one (./docker/build-bitcoin-image.sh).
    image: ${BTC_IMAGE:-bitcoin/bitcoin:31.1}
    container_name: btc-simnet-node1
    restart: unless-stopped
    # Grace must outlive the slowest shutdown flush (chainstate + mempool.dat
    # after a heavy spam run). bitcoind has no internal shutdown timeout -- it
    # takes as long as the disk needs -- so docker's grace timer is the only
    # thing that can kill it mid-write. 300s matches common bitcoind systemd
    # practice; a clean stop is what makes resume and snapshots safe.
    stop_grace_period: 300s
    volumes:
      - node1-data:/home/bitcoin/.bitcoin
    ports:
      - "${NODE1_RPC_PORT:-18443}:18443"
      - "${NODE1_P2P_PORT:-18444}:18444"
      - "${NODE1_ZMQ_RAWBLOCK_PORT:-28332}:28332"
      - "${NODE1_ZMQ_RAWTX_PORT:-28333}:28333"
      - "${NODE1_ZMQ_HASHBLOCK_PORT:-28334}:28334"
      - "${NODE1_ZMQ_HASHTX_PORT:-28335}:28335"
      - "${NODE1_ZMQ_SEQUENCE_PORT:-28336}:28336"
    networks:
      btc-simnet-control:
      btc-simnet-p2p:
        aliases:
          - node1-p2p
    environment:
      - BTC_RPC_USER=${BTC_RPC_USER:-foo}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-rpcpassword}
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -regtest -rpcuser=$${BTC_RPC_USER} -rpcpassword=$${BTC_RPC_PASS} getblockcount"]
      interval: 2s
      timeout: 5s
      retries: 30
    command:
      - -printtoconsole
      - -regtest=1
      - -server=1
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcuser=${BTC_RPC_USER:-foo}
      - -rpcpassword=${BTC_RPC_PASS:-rpcpassword}
      - -fallbackfee=${FALLBACK_FEE:-0.0001}
      - -minrelaytxfee=${MIN_RELAY_TX_FEE:-0.00001}
      - -maxtxfee=${MAX_TX_FEE:-10000000}
      - -blockreservedweight=${BLOCK_RESERVED_WEIGHT:-2000}
      # Wallet disabled by default: node1 mimics a 3rd-party production
      # endpoint, the user manages keys externally and submits signed raw txs
      - -disablewallet=${NODE1_DISABLE_WALLET:-1}
      - -port=18444
      - -rpcport=18443
      - -txindex
      # ZMQ publishers (all five topics), so ZMQ consumers (LND/CLN,
      # indexers, watchers) can run against the simnet
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
      - -zmqpubhashblock=tcp://0.0.0.0:28334
      - -zmqpubhashtx=tcp://0.0.0.0:28335
      - -zmqpubsequence=tcp://0.0.0.0:28336
      - -addnode=node2-p2p:18444
      - -addnode=node3-p2p:18444
      # - -debug=1
      # - -debug=rpc
      # - -debug=net
      # - -debug=mempool
      # - -debug=validation

  btc-simnet-node2:
    image: ${BTC_IMAGE:-bitcoin/bitcoin:31.1}
    container_name: btc-simnet-node2
    restart: unless-stopped
    stop_grace_period: 300s
    volumes:
      - node2-data:/home/bitcoin/.bitcoin
    ports:
      - "${NODE2_RPC_PORT:-28443}:18443"
      - "${NODE2_P2P_PORT:-28444}:18444"
      - "${NODE2_ZMQ_RAWBLOCK_PORT:-38332}:28332"
      - "${NODE2_ZMQ_RAWTX_PORT:-38333}:28333"
      - "${NODE2_ZMQ_HASHBLOCK_PORT:-38334}:28334"
      - "${NODE2_ZMQ_HASHTX_PORT:-38335}:28335"
      - "${NODE2_ZMQ_SEQUENCE_PORT:-38336}:28336"
    networks:
      btc-simnet-control:
      btc-simnet-p2p:
        aliases:
          - node2-p2p
    environment:
      - BTC_RPC_USER=${BTC_RPC_USER:-foo}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-rpcpassword}
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -regtest -rpcuser=$${BTC_RPC_USER} -rpcpassword=$${BTC_RPC_PASS} getblockcount"]
      interval: 2s
      timeout: 5s
      retries: 30
    command:
      - -printtoconsole
      - -regtest=1
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcuser=${BTC_RPC_USER:-foo}
      - -rpcpassword=${BTC_RPC_PASS:-rpcpassword}
      - -fallbackfee=${FALLBACK_FEE:-0.0001}
      - -minrelaytxfee=${MIN_RELAY_TX_FEE:-0.00001}
      - -maxtxfee=${MAX_TX_FEE:-10000000}
      - -blockreservedweight=${BLOCK_RESERVED_WEIGHT:-2000}
      - -port=18444
      - -rpcport=18443
      - -txindex
      # ZMQ publishers (all five topics), so wallet/L2 stacks on the owned
      # node (LND, ordinals indexers, ...) can consume notifications
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
      - -zmqpubhashblock=tcp://0.0.0.0:28334
      - -zmqpubhashtx=tcp://0.0.0.0:28335
      - -zmqpubsequence=tcp://0.0.0.0:28336
      - -addnode=node1-p2p:18444
      - -addnode=node3-p2p:18444

  btc-simnet-node3:
    image: ${BTC_IMAGE:-bitcoin/bitcoin:31.1}
    container_name: btc-simnet-node3
    restart: unless-stopped
    stop_grace_period: 300s
    volumes:
      - node3-data:/home/bitcoin/.bitcoin
    networks:
      btc-simnet-control:
      btc-simnet-p2p:
        aliases:
          - node3-p2p
    environment:
      - BTC_RPC_USER=${BTC_RPC_USER:-foo}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-rpcpassword}
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -regtest -rpcuser=$${BTC_RPC_USER} -rpcpassword=$${BTC_RPC_PASS} getblockcount"]
      interval: 2s
      timeout: 5s
      retries: 30
    command:
      - -printtoconsole
      - -regtest=1
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcuser=${BTC_RPC_USER:-foo}
      - -rpcpassword=${BTC_RPC_PASS:-rpcpassword}
      - -fallbackfee=${FALLBACK_FEE:-0.0001}
      - -minrelaytxfee=${MIN_RELAY_TX_FEE:-0.00001}
      - -maxtxfee=${MAX_TX_FEE:-10000000}
      - -blockreservedweight=${BLOCK_RESERVED_WEIGHT:-2000}
      - -port=18444
      - -rpcport=18443
      - -txindex
      - -addnode=node1-p2p:18444
      - -addnode=node2-p2p:18444

  btc-simnet-mining-controller:
    build:
      context: .
      dockerfile: docker/tools.Dockerfile
      target: mining-controller
    container_name: btc-simnet-mining-controller
    # A crash (e.g. an RPC hiccup) must not stop the chain: the bootstrap is
    # stage-resumable, so restarting mid-run (even mid-bootstrap) is safe.
    restart: on-failure
    depends_on:
      btc-simnet-node1:
        condition: service_healthy
      btc-simnet-node2:
        condition: service_healthy
      btc-simnet-node3:
        condition: service_healthy
    networks:
      - btc-simnet-control
    environment:
      - USER_ADDRESS=${USER_ADDRESS:-bcrt1qtmjqjf4t0mcts4jw9hvm54nl2rhjyeclntf3rr}
      - BLOCK_INTERVAL_MEAN_SECS=${BLOCK_INTERVAL_MEAN_SECS:-15}
      - BLOCK_INTERVAL_MODE=${BLOCK_INTERVAL_MODE:-poisson}
      - BLOCK_INTERVAL_MIN_SECS=${BLOCK_INTERVAL_MIN_SECS:-10}
      - BLOCK_INTERVAL_MAX_SECS=${BLOCK_INTERVAL_MAX_SECS:-20}
      - MINER_WEIGHTS=${MINER_WEIGHTS:-}
      - MINING_RNG_SEED=${MINING_RNG_SEED:-}
      - BTC_RPC_USER=${BTC_RPC_USER:-foo}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-rpcpassword}
      - NODE2_WALLET_NAME=${NODE2_WALLET_NAME:-node2}
      - NODE3_WALLET_NAME=${NODE3_WALLET_NAME:-node3}
      - NODE2_RPC_URL=${NODE2_RPC_URL:-http://btc-simnet-node2:18443}
      - NODE3_RPC_URL=${NODE3_RPC_URL:-http://btc-simnet-node3:18443}

  btc-simnet-spammer:
    build:
      context: .
      dockerfile: docker/tools.Dockerfile
      target: spammer
    container_name: btc-simnet-spammer
    # Stateless between cycles: safe to restart after a crash, spam resumes.
    restart: on-failure
    depends_on:
      btc-simnet-node1:
        condition: service_healthy
      btc-simnet-node2:
        condition: service_healthy
      btc-simnet-node3:
        condition: service_healthy
      btc-simnet-mining-controller:
        condition: service_started
    networks:
      - btc-simnet-control
    environment:
      - ENABLE_SPAM=${ENABLE_SPAM:-true}
      # true = raw engine (spammer signs its own txs, immune to wallet
      # fatigue); false = original node-wallet engine (sendtoaddress/sendmany)
      - USE_RAW_TX_SPAM=${USE_RAW_TX_SPAM:-true}
      # Floor price level. Floor fills pay exactly this; DATA/HYBRID bulk
      # spam pays a small premium so floor fills remain residual-gap sealers.
      - FALLBACK_FEE=${FALLBACK_FEE:-0.0001}
      # Fixed tx count for OUTPUT modes (sequential/batch) and the wallet
      # engine. Ignored in DATA/HYBRID mode (fill is driven by the ratio below).
      - SPAM_FIXED_TXS_PER_BLOCK=${SPAM_FIXED_TXS_PER_BLOCK:-100}
      # OUTPUT-mode fatness: 0 = sequential, N = batch of N burn outputs per tx.
      - SPAM_SENDMANY_OUTPUTS=${SPAM_SENDMANY_OUTPUTS:-0}
      # DATA/HYBRID mode (raw engine, Core 30+), the default: fills blocks with
      # OP_RETURN data txs (no UTXO-set growth, nodes stay near-idle). MAX is
      # the biggest payload; MIN < MAX spreads tx sizes log-uniformly. Set
      # MAX=0 for the legacy OUTPUT mode (burn-output txs, UTXO-heavy).
      - SPAM_TX_DATA_MAX_BYTES=${SPAM_TX_DATA_MAX_BYTES:-90000}
      - SPAM_TX_DATA_MIN_BYTES=${SPAM_TX_DATA_MIN_BYTES:-250}
      # Extra minimum-size floor-priced txs per block, on top of the data fill:
      # they add a stream of small realistic-looking txs. 0 = none.
      - SPAM_SMALL_TXS_PER_BLOCK=${SPAM_SMALL_TXS_PER_BLOCK:-0}
      # Airtight fee floor (DATA/HYBRID mode): keep this many standalone
      # floor-priced ~110-vB self-transfers STANDING in the mempool.
      # 0 = off (soft floor).
      - SPAM_FLOOR_POOL_TXS=${SPAM_FLOOR_POOL_TXS:-4000}
      # DATA/HYBRID fill target in blocks of mempool weight: 0.5 = half-full
      # blocks (floor off), 1 = full + shallow backlog, 5 = full + ~4 pending.
      # Default 2: the mempool swings ~1 block between top-ups, so 2 keeps a
      # full block of floor-priced supply at every template (airtight floor);
      # 1 rides the trough and can leave occasional partial blocks.
      - SPAM_FILL_BLOCK_RATIO=${SPAM_FILL_BLOCK_RATIO:-2.0}
      # Auto-size the branch pool from the fill ratio (max(12, ratio x15)).
      # false = use SPAM_FANOUT_UTXOS, erroring if below the ratio x10 minimum.
      - SPAM_FANOUT_AUTO=${SPAM_FANOUT_AUTO:-true}
      - SPAM_FANOUT_UTXOS=${SPAM_FANOUT_UTXOS:-50}
      - ENABLE_SPAM_REPLACES=${ENABLE_SPAM_REPLACES:-false}
      - SPAM_REPLACES_PER_MINER_PER_BLOCK=${SPAM_REPLACES_PER_MINER_PER_BLOCK:-5}
      - BTC_RPC_USER=${BTC_RPC_USER:-foo}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-rpcpassword}
      - NODE2_WALLET_NAME=${NODE2_WALLET_NAME:-node2}
      - NODE3_WALLET_NAME=${NODE3_WALLET_NAME:-node3}
      - NODE1_RPC_URL=${NODE1_RPC_URL:-http://btc-simnet-node1:18443}
      - NODE2_RPC_URL=${NODE2_RPC_URL:-http://btc-simnet-node2:18443}
      - NODE3_RPC_URL=${NODE3_RPC_URL:-http://btc-simnet-node3:18443}

  # ---------------------------------------------------------------------------
  # Reorg simulator (profile: reorg), one-shot by default, dies when done.
  #   docker compose run --rm btc-simnet-reorg [depth]
  #   docker compose run --rm btc-simnet-reorg [depth] empty   # chaos: empty blocks
  # The optional `empty` argument mines empty replacement blocks (orphaned txs
  # stay unconfirmed) instead of re-mining them; it is a per-run choice, not a
  # setting, so real and empty reorgs can be interleaved on the same chain.
  # Continuous mode: REORG_MODE=auto docker compose --profile reorg up btc-simnet-reorg
  # ---------------------------------------------------------------------------
  btc-simnet-reorg:
    profiles: ["reorg"]
    build:
      context: .
      dockerfile: docker/tools.Dockerfile
      target: reorg
    container_name: btc-simnet-reorg
    restart: "no"
    depends_on:
    # user can specify a different reorg node, default is node3
      btc-simnet-node2:
        condition: service_healthy
      btc-simnet-node3:
        condition: service_healthy
    networks:
      - btc-simnet-control
    environment:
      - BTC_RPC_USER=${BTC_RPC_USER:-foo}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-rpcpassword}
      - REORG_NODE=${REORG_NODE:-btc-simnet-node3}
      - REORG_NODE_RPC_PORT=${REORG_NODE_RPC_PORT:-18443}
      - REORG_DEPTH=${REORG_DEPTH:-3}
      - REORG_MODE=${REORG_MODE:-once}
      - AUTO_REORG_EVERY_BLOCKS=${AUTO_REORG_EVERY_BLOCKS:-20}
      - REORG_MINE_ADDRESS=${REORG_MINE_ADDRESS:-bcrt1qtmjqjf4t0mcts4jw9hvm54nl2rhjyeclntf3rr}
      # Fresh txs the reorg node mines into the winning chain, modelling a node
      # that saw transactions its peers have not yet (0 disables; ignored for
      # `empty` reorgs).
      - REORG_ADDS_NEW_TXS=${REORG_ADDS_NEW_TXS:-5}
      # Percentage (0-100) of eligible orphaned wallet txs to permanently drop
      # by mining a same-input, different-output conflict into the replacement
      # chain (0 disables; ignored for `empty` reorgs). Only reorg-node
      # wallet-engine spam is eligible; with USE_RAW_TX_SPAM=true there may be
      # nothing to conflict.
      - REORG_DOUBLE_SPEND_PCT=${REORG_DOUBLE_SPEND_PCT:-0}
      # Passed through so the reorg tool can warn when permanent-drop mode is
      # requested against raw-engine spam, whose keys its wallet cannot sign.
      - USE_RAW_TX_SPAM=${USE_RAW_TX_SPAM:-true}
      # Wallet used for REORG_ADDS_NEW_TXS (follows the controller-created
      # wallet on the default reorg node)
      - REORG_WALLET_NAME=${REORG_WALLET_NAME:-${NODE3_WALLET_NAME:-node3}}
      # Node polled after the reorg to confirm the network adopted the new
      # chain (extra blocks are mined until it does); "none" disables
      - REORG_WITNESS_NODE=${REORG_WITNESS_NODE:-btc-simnet-node1}

  # ---------------------------------------------------------------------------
  # Declarative scenario orchestrator (profile: scenario), one-shot.
  # It is intentionally excluded from all-tools because the Docker socket is
  # root-equivalent host access. See docs/SCENARIOS.md.
  # ---------------------------------------------------------------------------
  btc-simnet-scenario:
    profiles: ["scenario"]
    build:
      context: .
      dockerfile: docker/tools.Dockerfile
      target: scenario-engine
    container_name: btc-simnet-scenario
    restart: "no"
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      btc-simnet-node1:
        condition: service_healthy
      btc-simnet-node2:
        condition: service_healthy
      btc-simnet-node3:
        condition: service_healthy
    networks:
      - btc-simnet-control
    environment:
      - SIMCHAIN_REPO_ROOT=/workspace
      # Preserve the host compose project across the /workspace bind path, so
      # nested compose commands operate on the existing controller container.
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-simchain}
      - SCENARIO_FILE=${SCENARIO_FILE:-/workspace/scenarios/pause-then-burst.yml}
      - SCENARIO_RESULT_FILE=${SCENARIO_RESULT_FILE:-}
      - SCENARIO_TIMEOUT_SECS=${SCENARIO_TIMEOUT_SECS:-1800}
      - BTC_RPC_USER=${BTC_RPC_USER:-foo}
      - BTC_RPC_PASS=${BTC_RPC_PASS:-rpcpassword}
      - NODE1_RPC_URL=${NODE1_RPC_URL:-http://btc-simnet-node1:18443}
      - NODE2_RPC_URL=${NODE2_RPC_URL:-http://btc-simnet-node2:18443}
      - NODE3_RPC_URL=${NODE3_RPC_URL:-http://btc-simnet-node3:18443}
      - NODE2_WALLET_NAME=${NODE2_WALLET_NAME:-node2}
      - NODE3_WALLET_NAME=${NODE3_WALLET_NAME:-node3}

  # ---------------------------------------------------------------------------
  # Tools: electrs (profiles: electrs, mempool, all-tools)
  # ---------------------------------------------------------------------------
  electrs:
    profiles: ["electrs", "mempool", "all-tools"]
    image: ${ELECTRS_IMAGE:-mempool/electrs:v3.3.0}
    container_name: regtest-electrs
    depends_on:
      btc-simnet-node1:
        condition: service_healthy
    ports:
      - "${ELECTRS_ELECTRUM_PORT:-60001}:60001"
      - "${ELECTRS_HTTP_PORT:-3000}:3000"
    command:
      - --network=regtest
      - --daemon-rpc-addr=btc-simnet-node1:18443
      - --electrum-rpc-addr=0.0.0.0:60001
      - --http-addr=0.0.0.0:3000
      - --cookie=${BTC_RPC_USER:-foo}:${BTC_RPC_PASS:-rpcpassword}
      - --jsonrpc-import
      - --db-dir=/tmp/electrs-db
    networks:
      - btc-simnet-control

  # ---------------------------------------------------------------------------
  # Tools: mempool.space explorer (profiles: mempool, all-tools)
  # Browse http://localhost:${MEMPOOL_WEB_PORT:-1080}/
  # ---------------------------------------------------------------------------
  mempool-web:
    profiles: ["mempool", "all-tools"]
    image: ${MEMPOOL_FRONTEND_IMAGE:-mempool/frontend:v3.3.1}
    container_name: mempool-web
    environment:
      FRONTEND_HTTP_PORT: "8080"
      BACKEND_MAINNET_HTTP_HOST: "mempool-api"
    depends_on:
      - mempool-api
    user: "1000:1000"
    restart: always
    stop_grace_period: 10s
    command: "./wait-for mempool-db:3306 --timeout=720 -- nginx -g 'daemon off;'"
    ports:
      - "${MEMPOOL_WEB_PORT:-1080}:8080"
    networks:
      - btc-simnet-control

  mempool-api:
    profiles: ["mempool", "all-tools"]
    image: ${MEMPOOL_BACKEND_IMAGE:-mempool/backend:v3.3.1}
    container_name: mempool-api
    environment:
      MEMPOOL_BACKEND: "electrum"
      ELECTRUM_HOST: "electrs"
      ELECTRUM_PORT: "60001"
      ELECTRUM_TLS_ENABLED: "false"
      CORE_RPC_HOST: "btc-simnet-node1"
      CORE_RPC_PORT: "18443"
      CORE_RPC_USERNAME: ${BTC_RPC_USER:-foo}
      CORE_RPC_PASSWORD: ${BTC_RPC_PASS:-rpcpassword}
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "mempool-db"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: ${MEMPOOL_DB_USER:-mempool}
      DATABASE_PASSWORD: ${MEMPOOL_DB_PASS:-mempool}
      STATISTICS_ENABLED: "true"
    depends_on:
      mempool-db:
        condition: service_healthy
      electrs:
        condition: service_started
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 5s
    command: "./wait-for-it.sh mempool-db:3306 --timeout=720 --strict -- ./start.sh"
    networks:
      - btc-simnet-control

  mempool-db:
    profiles: ["mempool", "all-tools"]
    image: ${MARIADB_IMAGE:-mariadb:10.5.8}
    container_name: mempool-db
    environment:
      MYSQL_DATABASE: "mempool"
      MYSQL_USER: ${MEMPOOL_DB_USER:-mempool}
      MYSQL_PASSWORD: ${MEMPOOL_DB_PASS:-mempool}
      MYSQL_ROOT_PASSWORD: ${MEMPOOL_DB_ROOT_PASS:-admin}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: always
    stop_grace_period: 10s
    networks:
      - btc-simnet-control

  # ---------------------------------------------------------------------------
  # P2P latency/loss helpers (profile: partition), run on demand by netem.sh.
  # Each helper shares a node's network namespace, but only the short-lived
  # helper receives NET_ADMIN. No helper joins a network independently.
  # ---------------------------------------------------------------------------
  btc-simnet-netem-node1:
    profiles: ["partition"]
    build:
      context: .
      dockerfile: docker/netem.Dockerfile
    network_mode: "service:btc-simnet-node1"
    cap_add: ["NET_ADMIN"]
    environment:
      - P2P_PEER_ALIAS=node2-p2p
    depends_on:
      btc-simnet-node1:
        condition: service_started

  btc-simnet-netem-node2:
    profiles: ["partition"]
    build:
      context: .
      dockerfile: docker/netem.Dockerfile
    network_mode: "service:btc-simnet-node2"
    cap_add: ["NET_ADMIN"]
    environment:
      - P2P_PEER_ALIAS=node1-p2p
    depends_on:
      btc-simnet-node2:
        condition: service_started

  btc-simnet-netem-node3:
    profiles: ["partition"]
    build:
      context: .
      dockerfile: docker/netem.Dockerfile
    network_mode: "service:btc-simnet-node3"
    cap_add: ["NET_ADMIN"]
    environment:
      - P2P_PEER_ALIAS=node1-p2p
    depends_on:
      btc-simnet-node3:
        condition: service_started
